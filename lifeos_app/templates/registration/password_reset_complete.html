{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[70vh] flex-col justify-center py-12 sm:px-6 lg:px-8 animate-fade-in">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="text-center">
            <span class="inline-flex p-3 bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20 mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </span>
            <h2 class="text-3xl font-extrabold text-white tracking-tight">
                Password Reset Complete
            </h2>
            <p class="mt-3 text-sm text-gray-400">
                Your password has been successfully set. You may now log in with your new password.
            </p>
        </div>

        <div class="mt-8 flex justify-center">
            <a href="{% url 'login' %}" class="px-6 py-2 bg-emerald-400 hover:bg-emerald-300 text-gray-900 rounded-lg text-xs font-semibold shadow-md transition-colors">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
