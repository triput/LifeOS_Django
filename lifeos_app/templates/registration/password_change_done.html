{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-12 px-4 sm:px-6 lg:px-8 animate-fade-in text-center">
    <div class="space-y-6">
        <span class="inline-flex p-3 bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20 mb-4 animate-bounce">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </span>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">
            Password Changed Successfully
        </h2>
        <p class="mt-3 text-sm text-gray-400">
            Your password has been successfully updated. You may now continue using the system.
        </p>

        <div class="mt-8">
            <a href="{% url 'settings' %}" class="px-6 py-2.5 bg-emerald-400 hover:bg-emerald-300 text-gray-900 rounded-lg text-xs font-semibold shadow-md transition-colors">
                Back to Settings
            </a>
        </div>
    </div>
</div>
{% endblock %}
