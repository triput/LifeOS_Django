{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[75vh] flex-col justify-center py-12 sm:px-6 lg:px-8 animate-fade-in">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-[#0D111D] border border-gray-800 rounded-2xl p-8 shadow-2xl text-center space-y-6">
            <!-- Success Glowing Icon -->
            <div class="flex justify-center">
                <span class="inline-flex p-4 bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20 shadow-[0_0_20px_rgba(16,185,129,0.15)] animate-bounce">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </span>
            </div>
            
            <div class="space-y-2">
                <h2 class="text-3xl font-extrabold text-white tracking-tight">
                    Password Changed
                </h2>
                <p class="text-sm text-gray-400 leading-relaxed">
                    Your password has been successfully updated. You may now continue using the system.
                </p>
            </div>

            <div class="pt-4 border-t border-gray-800/60">
                <a href="{% url 'settings' %}" class="inline-flex justify-center w-full px-4 py-3 bg-emerald-400 hover:bg-emerald-300 text-gray-900 rounded-lg text-xs font-bold shadow-lg transition-all transform hover:-translate-y-0.5">
                    Return to Settings
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
